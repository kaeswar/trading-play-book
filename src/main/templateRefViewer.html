<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plan Template — Trading Journal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      background: #161922;
      border-bottom: 1px solid rgba(100,116,139,0.2);
      -webkit-app-region: drag;
      flex-shrink: 0;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 14px;
      -webkit-app-region: no-drag;
    }

    .close-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: #64748b;
      font-size: 13px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.15s;
    }
    .close-btn:hover { background: rgba(100,116,139,0.15); color: #e2e8f0; }
    .close-btn svg { width: 15px; height: 15px; }

    .toolbar-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #374151;
      font-weight: 600;
    }

    /* ── Identity strip ── */
    .identity {
      padding: 20px 28px 18px;
      background: rgba(22,25,34,0.6);
      border-bottom: 1px solid rgba(100,116,139,0.15);
      flex-shrink: 0;
    }

    .plan-name {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.02em;
      line-height: 1.25;
      margin-bottom: 12px;
    }

    .badges {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 12px;
      border-radius: 20px;
      border: 1px solid transparent;
      letter-spacing: 0.02em;
    }

    .badge-group {
      font-size: 11px;
      padding: 3px 12px;
      border-radius: 20px;
      border: 1px solid rgba(100,116,139,0.3);
      color: #6b7280;
      font-weight: 400;
    }

    /* ── Content area ── */
    .content {
      flex: 1;
      overflow: hidden;
      display: flex;
    }

    /* Description panel */
    .desc-panel {
      overflow-y: auto;
      padding: 24px 28px;
      border-right: 1px solid rgba(100,116,139,0.15);
    }

    .desc-panel.full-width {
      flex: 1;
      border-right: none;
    }

    .panel-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #2dd4bf;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .desc-text {
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.9;
      white-space: pre-wrap;
      user-select: text;
    }

    /* Chart panel */
    .chart-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chart-panel.full-width {
      flex: 1;
    }

    .chart-header {
      padding: 24px 28px 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chart-body {
      flex: 1;
      overflow: auto;
      padding: 0 28px 24px;
    }

    .chart-body img {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(100,116,139,0.2);
      display: block;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .chart-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      gap: 12px;
      color: #4b5563;
      font-size: 13px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid rgba(45,212,191,0.2);
      border-top-color: #2dd4bf;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .open-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(45,212,191,0.1);
      border: 1px solid rgba(45,212,191,0.25);
      color: #2dd4bf;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-app-region: no-drag;
    }
    .open-btn:hover { background: rgba(45,212,191,0.18); }
    .open-btn svg { width: 12px; height: 12px; }

    .empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #374151;
      font-size: 13px;
      font-style: italic;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.25); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,0.45); }
  </style>
</head>
<body>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="close-btn" id="btnClose">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Close
      </button>
      <span style="width:1px;height:18px;background:rgba(100,116,139,0.2);display:inline-block"></span>
      <span class="toolbar-label">Plan Template</span>
    </div>
  </div>

  <!-- Identity strip -->
  <div class="identity">
    <div class="plan-name" id="planName">—</div>
    <div class="badges" id="badges"></div>
  </div>

  <!-- Content -->
  <div class="content" id="content">
    <div class="empty" id="emptyMsg" style="display:none">No additional details recorded for this template.</div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const fs = require('fs');
    const path = require('path');

    // ── Color maps ──
    const BIAS_COLORS = {
      'Super Bullish':    { bg:'rgba(16,185,129,0.2)',  text:'#34d399', border:'rgba(16,185,129,0.3)' },
      'Bullish':          { bg:'rgba(6,182,212,0.2)',   text:'#22d3ee', border:'rgba(6,182,212,0.3)' },
      'Possibly Bullish': { bg:'rgba(14,165,233,0.15)', text:'#7dd3fc', border:'rgba(14,165,233,0.25)' },
      'Range Bound':      { bg:'rgba(100,116,139,0.2)', text:'#94a3b8', border:'rgba(100,116,139,0.3)' },
      'Possibly Bearish': { bg:'rgba(244,63,94,0.15)',  text:'#fda4af', border:'rgba(244,63,94,0.25)' },
      'Bearish':          { bg:'rgba(239,68,68,0.2)',   text:'#f87171', border:'rgba(239,68,68,0.3)' },
      'Super Bearish':    { bg:'rgba(153,27,27,0.25)',  text:'#fca5a5', border:'rgba(153,27,27,0.4)' },
    };

    const TAG_COLORS = {
      'Super Bullish':    { bg:'rgba(16,185,129,0.2)',  text:'#34d399', border:'rgba(16,185,129,0.3)' },
      'Bullish (Medium)': { bg:'rgba(59,130,246,0.2)',  text:'#60a5fa', border:'rgba(59,130,246,0.3)' },
      'Bullish':          { bg:'rgba(6,182,212,0.2)',   text:'#22d3ee', border:'rgba(6,182,212,0.3)' },
      'Possibly Bullish': { bg:'rgba(14,165,233,0.15)', text:'#7dd3fc', border:'rgba(14,165,233,0.25)' },
      'Range Bound':      { bg:'rgba(100,116,139,0.2)', text:'#94a3b8', border:'rgba(100,116,139,0.3)' },
      'Possibly Bearish': { bg:'rgba(244,63,94,0.15)',  text:'#fda4af', border:'rgba(244,63,94,0.25)' },
      'Bearish':          { bg:'rgba(239,68,68,0.2)',   text:'#f87171', border:'rgba(239,68,68,0.3)' },
      'Super Bearish':    { bg:'rgba(153,27,27,0.25)',  text:'#fca5a5', border:'rgba(153,27,27,0.4)' },
      'OTF Bullish':      { bg:'rgba(16,185,129,0.1)',  text:'#6ee7b7', border:'rgba(16,185,129,0.2)' },
      'OTF Bearish':      { bg:'rgba(239,68,68,0.1)',   text:'#fca5a5', border:'rgba(239,68,68,0.2)' },
    };

    const TT_COLORS = {
      'Intraday': { bg:'rgba(99,102,241,0.2)',  text:'#818cf8', border:'rgba(99,102,241,0.3)' },
      'Swing':    { bg:'rgba(20,184,166,0.2)',  text:'#2dd4bf', border:'rgba(20,184,166,0.3)' },
      'Both':     { bg:'rgba(168,85,247,0.2)', text:'#c084fc', border:'rgba(168,85,247,0.3)' },
    };

    function makeBadge(label, colors) {
      const el = document.createElement('span');
      el.className = 'badge';
      el.textContent = label;
      if (colors) {
        el.style.background = colors.bg;
        el.style.color = colors.text;
        el.style.borderColor = colors.border;
      }
      return el;
    }

    // ── Load data ──
    const params = new URLSearchParams(window.location.search);
    const tpl = JSON.parse(decodeURIComponent(params.get('data') || '{}'));

    document.title = (tpl.name || 'Plan Template') + ' — Trading Journal';
    document.getElementById('planName').textContent = tpl.name || '—';

    // Badges
    const badgesEl = document.getElementById('badges');
    if (tpl.bias && BIAS_COLORS[tpl.bias]) badgesEl.appendChild(makeBadge(tpl.bias, BIAS_COLORS[tpl.bias]));

    // Behavior tag (only if different from bias)
    const tag = tpl.behavior_tag && tpl.behavior_tag !== tpl.bias ? tpl.behavior_tag : null;
    if (tag && TAG_COLORS[tag]) badgesEl.appendChild(makeBadge(tag, TAG_COLORS[tag]));

    if (tpl.trade_type && TT_COLORS[tpl.trade_type]) badgesEl.appendChild(makeBadge(tpl.trade_type, TT_COLORS[tpl.trade_type]));

    if (tpl.group_name) {
      const g = document.createElement('span');
      g.className = 'badge-group';
      g.textContent = tpl.group_name;
      badgesEl.appendChild(g);
    }

    // ── Build content area ──
    const contentEl = document.getElementById('content');
    const hasDesc  = !!(tpl.description && tpl.description.trim());
    const hasShot  = !!(tpl.screenshotFullPath && fs.existsSync(tpl.screenshotFullPath));

    if (!hasDesc && !hasShot) {
      document.getElementById('emptyMsg').style.display = 'flex';
    } else {
      // Description panel
      if (hasDesc) {
        const panel = document.createElement('div');
        panel.className = 'desc-panel' + (hasShot ? ' ' : ' full-width');
        if (hasShot) panel.style.width = '38%';

        const lbl = document.createElement('p');
        lbl.className = 'panel-label';
        lbl.textContent = 'Description';
        panel.appendChild(lbl);

        const txt = document.createElement('p');
        txt.className = 'desc-text';
        txt.textContent = tpl.description;
        panel.appendChild(txt);

        contentEl.appendChild(panel);
      }

      // Chart panel
      if (hasShot) {
        const panel = document.createElement('div');
        panel.className = 'chart-panel' + (hasDesc ? '' : ' full-width');

        const header = document.createElement('div');
        header.className = 'chart-header';

        const lbl = document.createElement('p');
        lbl.className = 'panel-label';
        lbl.style.marginBottom = '0';
        lbl.textContent = 'Reference Chart';
        header.appendChild(lbl);

        // Open in full viewer button
        const openBtn = document.createElement('button');
        openBtn.className = 'open-btn';
        openBtn.innerHTML = '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg> Full View';
        openBtn.addEventListener('click', () => {
          ipcRenderer.invoke('image:openViewer', tpl.screenshot_path);
        });
        header.appendChild(openBtn);

        panel.appendChild(header);

        const body = document.createElement('div');
        body.className = 'chart-body';

        const loader = document.createElement('div');
        loader.className = 'chart-loading';
        loader.innerHTML = '<div class="spinner"></div><span>Loading chart…</span>';
        body.appendChild(loader);

        const img = document.createElement('img');
        img.style.display = 'none';
        img.alt = 'Reference chart';
        body.appendChild(img);

        // Load image as base64
        try {
          const data = fs.readFileSync(tpl.screenshotFullPath);
          const ext  = path.extname(tpl.screenshotFullPath).toLowerCase();
          const mime = ext === '.png' ? 'image/png' : ext === '.gif' ? 'image/gif' : 'image/jpeg';
          img.src = `data:${mime};base64,${data.toString('base64')}`;
          img.onload = () => { loader.style.display = 'none'; img.style.display = 'block'; };
          img.onerror = () => { loader.innerHTML = '<span style="color:#ef4444">Could not load image</span>'; };
        } catch (e) {
          loader.innerHTML = '<span style="color:#ef4444">Could not load image</span>';
        }

        panel.appendChild(body);
        contentEl.appendChild(panel);
      }
    }

    // ── Controls ──
    document.getElementById('btnClose').addEventListener('click', () => window.close());
    window.addEventListener('keydown', (e) => { if (e.key === 'Escape') window.close(); });
  </script>
</body>
</html>
